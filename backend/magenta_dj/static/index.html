<!doctype html>
<!-- Throwaway M1 test page (replaced by the React app in M2). -->
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>magenta-dj — M1 deck test</title>
  <style>
    body { font-family: ui-monospace, monospace; max-width: 640px; margin: 2rem auto; }
    fieldset { margin-bottom: 1rem; }
    #stats span { display: inline-block; min-width: 10rem; }
    #log { height: 14rem; overflow-y: scroll; border: 1px solid #ccc; padding: 0.5rem; font-size: 0.8rem; white-space: pre; }
  </style>
</head>
<body>
  <h1>deck a — M1 test</h1>

  <fieldset>
    <button id="connect">connect</button>
    <button id="play" disabled>play</button>
    <button id="stop" disabled>stop</button>
  </fieldset>

  <fieldset>
    <input id="prompt" size="40" value="warm disco funk">
    <button id="setPrompt" disabled>set prompt</button>
  </fieldset>

  <p id="stats">
    <span>underruns: <b id="underruns">0</b></span>
    <span>buffered: <b id="buffered">0.0</b>s</span>
    <span>worklet: <b id="playing">idle</b></span>
  </p>

  <div id="log"></div>

  <script>
    const els = Object.fromEntries(
      ['connect', 'play', 'stop', 'prompt', 'setPrompt', 'underruns', 'buffered', 'playing', 'log']
        .map((id) => [id, document.getElementById(id)])
    );
    let ws = null;
    let workletNode = null;

    function log(line) {
      els.log.textContent += `${new Date().toISOString().slice(11, 19)} ${line}\n`;
      els.log.scrollTop = els.log.scrollHeight;
    }

    async function connect() {
      const ctx = new AudioContext({ sampleRate: 48000 });
      await ctx.audioWorklet.addModule('player-worklet.js');
      workletNode = new AudioWorkletNode(ctx, 'pcm-player', {
        numberOfOutputs: 1,
        outputChannelCount: [2],
      });
      workletNode.connect(ctx.destination);
      workletNode.port.onmessage = (event) => {
        const { underruns, bufferedSeconds, playing } = event.data;
        els.underruns.textContent = underruns;
        els.buffered.textContent = bufferedSeconds.toFixed(1);
        els.playing.textContent = playing ? 'playing' : 'idle';
      };

      ws = new WebSocket(`ws://${location.host}/ws/deck/a`);
      ws.binaryType = 'arraybuffer';
      ws.onmessage = (event) => {
        if (event.data instanceof ArrayBuffer) {
          const samples = new Float32Array(event.data);
          workletNode.port.postMessage(samples, [samples.buffer]);
        } else {
          log(event.data);
        }
      };
      ws.onopen = () => {
        log('connected');
        els.connect.disabled = true;
        for (const el of [els.play, els.stop, els.setPrompt]) el.disabled = false;
      };
      ws.onclose = (event) => log(`closed (${event.code}) ${event.reason}`);
    }

    els.connect.onclick = connect;
    els.play.onclick = () => ws.send(JSON.stringify({ type: 'play' }));
    els.stop.onclick = () => ws.send(JSON.stringify({ type: 'stop' }));
    els.setPrompt.onclick = () =>
      ws.send(JSON.stringify({ type: 'set_prompt', prompt: els.prompt.value }));
  </script>
</body>
</html>
